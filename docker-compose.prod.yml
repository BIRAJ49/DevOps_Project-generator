services:
  postgres:
    image: postgres:16-alpine
    container_name: autohealops-prod-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autohealops}
      POSTGRES_USER: ${POSTGRES_USER:-autohealops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autohealops}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autohealops} -d ${POSTGRES_DB:-autohealops}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/biraj49/devops_project-generator/backend:${IMAGE_TAG:-latest}
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  frontend:
    image: ghcr.io/biraj49/devops_project-generator/frontend:${IMAGE_TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://127.0.0.1:8080/health" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

volumes:
  postgres-prod-data:
