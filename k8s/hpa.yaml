apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autohealops-backend
  namespace: autohealops
  labels:
    app.kubernetes.io/name: autohealops-backend
    app.kubernetes.io/part-of: autohealops-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autohealops-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: autohealops-frontend
  namespace: autohealops
  labels:
    app.kubernetes.io/name: autohealops-frontend
    app.kubernetes.io/part-of: autohealops-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: autohealops-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
