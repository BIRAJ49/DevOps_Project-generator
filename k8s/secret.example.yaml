apiVersion: v1
kind: Secret
metadata:
  name: autohealops-secrets
  namespace: autohealops
  labels:
    app.kubernetes.io/name: autohealops
    app.kubernetes.io/part-of: autohealops-platform
type: Opaque
stringData:
  # Replace every value before applying. Do not commit real secrets.
  DATABASE_URL: "postgresql+psycopg://autohealops:autohealops@postgres:5432/autohealops"
  JWT_SECRET_KEY: "replace-with-a-secret-at-least-32-characters"
  RESEND_API_KEY: "replace-with-resend-api-key"
