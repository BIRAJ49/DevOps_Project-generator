apiVersion: v1
kind: ConfigMap
metadata:
  name: autohealops-config
  namespace: autohealops
  labels:
    app.kubernetes.io/name: autohealops
    app.kubernetes.io/part-of: autohealops-platform
data:
  APP_NAME: "AutoHealOps API"
  API_PREFIX: "/api"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "3600"
  FRONTEND_ORIGINS: "http://autohealops.local,http://localhost:8080,http://localhost:5173"
  GUEST_PROJECT_LIMIT: "3"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  RATE_LIMIT_MAX_REQUESTS: "30"
  AUTH_RATE_LIMIT_MAX_REQUESTS: "10"
  RATE_LIMIT_MAX_BUCKETS: "10000"
  ARTIFACT_STORAGE_BACKEND: "local"
  ARTIFACT_DOWNLOAD_TTL_SECONDS: "900"
  EMAIL_FROM: "ProjectOps<onboarding@resend.dev>"
  CONTACT_RECIPIENT_EMAIL: "terms301@gmail.com"
  EMAIL_VERIFICATION_CODE_TTL_MINUTES: "10"
  EMAIL_VERIFICATION_RESEND_COOLDOWN_SECONDS: "60"
  EMAIL_VERIFICATION_MAX_ATTEMPTS: "5"
