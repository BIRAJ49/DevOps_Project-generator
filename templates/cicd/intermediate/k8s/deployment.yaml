apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-report
  namespace: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment-report
  template:
    metadata:
      labels:
        app: deployment-report
    spec:
      containers:
        - name: deployment-report
          image: ghcr.io/example/deployment-report:replace-me
          ports:
            - containerPort: 8080

