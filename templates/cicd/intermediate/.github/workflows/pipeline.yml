name: pipeline

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: make test
      - run: make build

  security:
    needs: quality
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: docker build -t deployment-report:latest .
      - name: Scan image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: deployment-report:latest
          exit-code: "1"
          severity: HIGH,CRITICAL

  deploy-staging:
    needs: security
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
      - name: Apply manifests
        run: kubectl apply -f k8s/
