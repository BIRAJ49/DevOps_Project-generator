name: reusable-build

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
    outputs:
      image_tag:
        description: Built image tag
        value: ${{ jobs.build.outputs.image_tag }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ${{ inputs.image_name }}:${{ github.sha }} .
      - run: docker push ${{ inputs.image_name }}:${{ github.sha }}
      - id: meta
        run: echo "image_tag=${{ inputs.image_name }}:${{ github.sha }}" >> $GITHUB_OUTPUT
