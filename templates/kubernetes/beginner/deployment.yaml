apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-catalog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: release-catalog
  template:
    metadata:
      labels:
        app: release-catalog
    spec:
      containers:
        - name: api
          image: ghcr.io/example/release-catalog:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: release-catalog-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

