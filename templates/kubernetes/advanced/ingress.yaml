apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rollout-service
  namespace: production-platform
spec:
  ingressClassName: nginx
  rules:
    - host: rollout.example.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rollout-service
                port:
                  number: 80

