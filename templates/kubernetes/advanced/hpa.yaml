apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rollout-service
  namespace: production-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rollout-service-blue
  minReplicas: 3
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

