apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rollout-service
  namespace: production-platform
spec:
  podSelector:
    matchLabels:
      app: rollout-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53

