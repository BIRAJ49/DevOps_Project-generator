apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-dashboard
  namespace: platform-staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deployment-dashboard
  template:
    metadata:
      labels:
        app: deployment-dashboard
    spec:
      containers:
        - name: app
          image: ghcr.io/example/deployment-dashboard:2.4.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 400m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080

