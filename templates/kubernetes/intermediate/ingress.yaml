apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deployment-dashboard
  namespace: platform-staging
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: dashboard.example.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deployment-dashboard
                port:
                  number: 80

