services:
  api:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
