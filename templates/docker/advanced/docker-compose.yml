services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      redis:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

